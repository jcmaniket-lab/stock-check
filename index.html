<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Stock Check</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --navy:   #1a2f5a;
  --blue:   #2563eb;
  --blue2:  #dbeafe;
  --green:  #16a34a;
  --green2: #dcfce7;
  --red:    #dc2626;
  --red2:   #fee2e2;
  --amber:  #d97706;
  --amber2: #fef3c7;
  --g50:    #f8fafc;
  --g100:   #f1f5f9;
  --g200:   #e2e8f0;
  --g400:   #94a3b8;
  --g600:   #475569;
  --g800:   #1e293b;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Sora', sans-serif; background: #eef2ff; min-height: 100vh; color: var(--g800); }

.screen { display: none; min-height: 100vh; flex-direction: column; }
.screen.active { display: flex; }

/* ── START ── */
#s-start {
  background: linear-gradient(150deg, var(--navy) 0%, #1d4ed8 100%);
  align-items: center; justify-content: center; padding: 32px 24px; text-align: center;
}
.logo { font-size: 68px; margin-bottom: 14px; filter: drop-shadow(0 6px 16px rgba(0,0,0,.3)); }
.start-title { font-size: 34px; font-weight: 800; color: #fff; letter-spacing: -1px; margin-bottom: 4px; }
.start-sub { font-size: 14px; color: rgba(255,255,255,.55); margin-bottom: 36px; }
.start-card { background: #fff; border-radius: 22px; padding: 28px 24px; width: 100%; max-width: 420px; box-shadow: 0 12px 48px rgba(0,0,0,.25); }
.field-lbl { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--g400); margin-bottom: 6px; display: block; }
.field-inp { width: 100%; border: 2px solid var(--g200); border-radius: 12px; padding: 13px 15px; font-size: 15px; font-family: 'Sora',sans-serif; color: var(--g800); outline: none; transition: all .18s; background: var(--g50); margin-bottom: 18px; }
.field-inp:focus { border-color: var(--blue); background: #fff; box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
.btn-primary { width: 100%; background: var(--blue); color: #fff; border: none; border-radius: 14px; padding: 17px; font-size: 16px; font-weight: 700; font-family: 'Sora',sans-serif; cursor: pointer; transition: all .18s; box-shadow: 0 4px 16px rgba(37,99,235,.45); }
.btn-primary:active { transform: scale(.97); box-shadow: none; }

/* ── TOP BAR ── */
.top-bar { background: var(--navy); padding: 16px 18px 14px; position: sticky; top: 0; z-index: 20; }
.top-bar-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.top-bar-title { font-size: 16px; font-weight: 700; color: #fff; }
.top-bar-sub { font-size: 11px; color: rgba(255,255,255,.5); margin-top: 1px; }
.phase-pill { display: inline-flex; align-items: center; gap: 6px; border-radius: 20px; padding: 5px 13px; font-size: 11px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }
.phase-pill.p1 { background: rgba(96,165,250,.2); color: #93c5fd; }
.phase-pill.p2 { background: rgba(52,211,153,.2); color: #6ee7b7; }
.progress-wrap { display: flex; align-items: center; gap: 10px; }
.progress-track { flex: 1; height: 6px; background: rgba(255,255,255,.15); border-radius: 10px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 10px; transition: width .4s cubic-bezier(.4,0,.2,1); }
.p1-fill { background: linear-gradient(90deg,#60a5fa,#818cf8); }
.p2-fill { background: linear-gradient(90deg,#34d399,#10b981); }
.progress-label { font-size: 11px; font-family: 'JetBrains Mono',monospace; color: rgba(255,255,255,.6); white-space: nowrap; }

/* ── PHASE 1 ITEMS ── */
#s-phase1 { background: #eef2ff; }
.body-scroll { flex: 1; overflow-y: auto; padding: 16px; }

.item-card { background: #fff; border-radius: 16px; box-shadow: 0 2px 12px rgba(26,47,90,.09); margin-bottom: 12px; overflow: hidden; animation: up .22s ease-out; }
@keyframes up { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.item-card-hdr { background: #eff6ff; padding: 10px 14px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #dbeafe; }
.item-num { background: var(--blue); color: #fff; font-size: 11px; font-weight: 700; font-family: 'JetBrains Mono',monospace; width: 26px; height: 26px; border-radius: 7px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.item-card-label { font-size: 13px; font-weight: 600; color: var(--navy); flex: 1; }
.del-btn { background: none; border: none; color: var(--g200); font-size: 18px; cursor: pointer; line-height: 1; border-radius: 6px; padding: 2px 5px; transition: all .15s; }
.del-btn:active { color: var(--red); background: var(--red2); }
.item-card-body { padding: 14px; }
.inp-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--g400); margin-bottom: 5px; display: flex; align-items: center; gap: 5px; }
.dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.dot-name  { background: #8b5cf6; }
.dot-brand { background: #f59e0b; }
.dot-qty   { background: var(--blue); }
.card-inp { width: 100%; border: 2px solid var(--g200); border-radius: 10px; padding: 10px 12px; font-size: 14px; font-family: 'Sora',sans-serif; color: var(--g800); outline: none; transition: all .18s; background: var(--g50); margin-bottom: 12px; }
.card-inp:focus { border-color: var(--blue); background: #fff; box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
.qty-row { display: flex; gap: 8px; align-items: center; }
.qty-btn { width: 44px; height: 44px; border-radius: 11px; border: 2px solid var(--g200); background: #fff; font-size: 20px; font-weight: 600; color: var(--g600); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .15s; }
.qty-btn:active { background: var(--blue2); border-color: var(--blue); color: var(--blue); transform: scale(.92); }
.qty-inp { flex: 1; border: 2px solid var(--g200); border-radius: 10px; padding: 10px; font-size: 20px; font-family: 'JetBrains Mono',monospace; font-weight: 500; text-align: center; color: var(--navy); outline: none; transition: all .18s; background: var(--g50); }
.qty-inp:focus { border-color: var(--blue); background: #fff; box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
.add-btn { width: 100%; background: #fff; border: 2px dashed #93c5fd; border-radius: 14px; padding: 15px; font-size: 14px; font-weight: 600; color: var(--blue); cursor: pointer; font-family: 'Sora',sans-serif; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all .18s; margin-bottom: 16px; }
.add-btn:active { background: var(--blue2); }

/* ── FOOTER ── */
.foot { padding: 14px 16px; background: #fff; border-top: 1px solid var(--g200); display: flex; gap: 10px; }
.btn-ghost { background: var(--g100); border: none; border-radius: 12px; padding: 15px 16px; font-size: 13px; font-weight: 600; color: var(--g600); cursor: pointer; font-family: 'Sora',sans-serif; transition: all .18s; }
.btn-ghost:active { background: var(--g200); }
.btn-next { flex: 1; border: none; border-radius: 12px; padding: 15px; font-size: 15px; font-weight: 700; color: #fff; cursor: pointer; font-family: 'Sora',sans-serif; transition: all .18s; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-next.blue  { background: var(--blue);  box-shadow: 0 4px 14px rgba(37,99,235,.4); }
.btn-next.green { background: var(--green); box-shadow: 0 4px 14px rgba(22,163,74,.4); }
.btn-next:active { transform: scale(.97); box-shadow: none; }

/* ── PHASE 2 ── */
#s-phase2 { background: #f0fdf4; }
.p2-banner { background: linear-gradient(135deg,#064e3b,#065f46); padding: 20px 18px 18px; }
.p2-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,.15); color: #6ee7b7; font-size: 10px; font-weight: 700; letter-spacing: .08em; padding: 4px 12px; border-radius: 20px; margin-bottom: 10px; text-transform: uppercase; }
.p2-title { font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 4px; letter-spacing: -.3px; }
.p2-sub { font-size: 13px; color: rgba(255,255,255,.6); margin-bottom: 14px; }
.comp-card { background: #fff; border-radius: 14px; box-shadow: 0 2px 10px rgba(6,78,59,.1); margin-bottom: 10px; overflow: hidden; display: flex; align-items: center; animation: up .2s ease-out; border-left: 4px solid var(--g200); transition: border-color .2s; }
.comp-card.checked { border-color: var(--green); }
.comp-card-left { padding: 14px; flex: 1; min-width: 0; }
.comp-item-name { font-size: 14px; font-weight: 700; color: var(--g800); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.comp-item-brand { font-size: 11px; color: var(--g400); margin-top: 2px; }
.comp-phys-tag { display: inline-flex; align-items: center; gap: 4px; background: var(--blue2); color: var(--blue); font-size: 11px; font-weight: 700; font-family: 'JetBrains Mono',monospace; padding: 3px 9px; border-radius: 6px; margin-top: 6px; }
.comp-card-right { padding: 12px 14px 12px 0; flex-shrink: 0; }
.comp-inp { width: 88px; border: 2px solid var(--g200); border-radius: 10px; padding: 10px 8px; font-size: 20px; font-family: 'JetBrains Mono',monospace; font-weight: 500; text-align: center; color: var(--navy); outline: none; transition: all .18s; background: var(--g50); }
.comp-inp:focus { border-color: var(--green); background: #fff; box-shadow: 0 0 0 3px rgba(22,163,74,.12); }
.comp-inp.done { border-color: var(--green); background: var(--green2); color: var(--green); }

/* ── SUMMARY ── */
#s-summary { background: #eef2ff; }
.sum-hero { background: linear-gradient(135deg,var(--green),#059669); padding: 32px 24px 28px; text-align: center; }
.sum-icon { font-size: 52px; margin-bottom: 10px; }
.sum-title { font-size: 26px; font-weight: 800; color: #fff; margin-bottom: 4px; letter-spacing: -.5px; }
.sum-meta { font-size: 13px; color: rgba(255,255,255,.65); }
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
.stat-card { background: #fff; border-radius: 14px; padding: 16px; text-align: center; box-shadow: 0 2px 8px rgba(26,47,90,.08); border-top: 3px solid transparent; }
.stat-card.total { border-color: var(--blue); }
.stat-card.match { border-color: var(--green); }
.stat-card.short { border-color: var(--red); }
.stat-card.over  { border-color: var(--amber); }
.stat-n { font-size: 38px; font-weight: 800; font-family: 'JetBrains Mono',monospace; }
.total .stat-n { color: var(--blue); }
.match .stat-n { color: var(--green); }
.short .stat-n { color: var(--red); }
.over  .stat-n { color: var(--amber); }
.stat-lbl { font-size: 11px; color: var(--g400); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; margin-top: 2px; }
.res-section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--g400); margin-bottom: 8px; }
.res-item { background: #fff; border-radius: 12px; padding: 11px 13px; margin-bottom: 7px; display: flex; align-items: center; gap: 10px; box-shadow: 0 1px 5px rgba(26,47,90,.07); }
.res-badge { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px; flex-shrink: 0; font-family: 'JetBrains Mono',monospace; }
.b-match { background: var(--green2); color: var(--green); }
.b-over  { background: var(--amber2); color: var(--amber); }
.b-short { background: var(--red2);   color: var(--red); }
.b-na    { background: var(--g100);   color: var(--g400); }
.res-name { font-size: 13px; font-weight: 600; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.res-nums { font-family: 'JetBrains Mono',monospace; font-size: 11px; color: var(--g400); flex-shrink: 0; text-align: right; line-height: 1.6; }
.sum-foot { padding: 14px 16px; background: #fff; border-top: 1px solid var(--g200); display: flex; gap: 10px; }
.btn-export { flex: 1; background: var(--navy); border: none; border-radius: 12px; padding: 17px; font-size: 15px; font-weight: 700; color: #fff; cursor: pointer; font-family: 'Sora',sans-serif; transition: all .18s; box-shadow: 0 4px 14px rgba(26,47,90,.35); display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-export:active { transform: scale(.97); }
.btn-new { background: var(--g100); border: none; border-radius: 12px; padding: 17px 18px; font-size: 13px; font-weight: 600; color: var(--g600); cursor: pointer; font-family: 'Sora',sans-serif; }

/* ── CONFIRM OVERLAY ── */
.overlay { position: fixed; inset: 0; background: rgba(10,20,50,.55); display: flex; align-items: flex-end; justify-content: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity .25s; }
.overlay.show { opacity: 1; pointer-events: all; }
.confirm-sheet { background: #fff; border-radius: 22px 22px 0 0; padding: 28px 24px 36px; width: 100%; max-width: 460px; transform: translateY(40px); transition: transform .28s cubic-bezier(.4,0,.2,1); }
.overlay.show .confirm-sheet { transform: translateY(0); }
.confirm-title { font-size: 19px; font-weight: 800; color: var(--navy); margin-bottom: 8px; }
.confirm-body { font-size: 14px; color: var(--g600); line-height: 1.65; margin-bottom: 22px; }
.confirm-actions { display: flex; gap: 10px; }
.confirm-cancel { flex: 1; background: var(--g100); border: none; border-radius: 12px; padding: 15px; font-size: 14px; font-weight: 600; color: var(--g600); cursor: pointer; font-family: 'Sora',sans-serif; }
.confirm-go { flex: 2; background: var(--green); border: none; border-radius: 12px; padding: 15px; font-size: 14px; font-weight: 700; color: #fff; cursor: pointer; font-family: 'Sora',sans-serif; }

/* ── TOAST ── */
.toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(12px); background: var(--g800); color: #fff; padding: 11px 20px; border-radius: 12px; font-size: 13px; font-weight: 600; opacity: 0; transition: all .28s; pointer-events: none; z-index: 999; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.ok  { background: var(--green); }
.toast.err { background: var(--red); }

input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
input[type=number] { -moz-appearance: textfield; }
</style>
</head>
<body>

<!-- ════════ SCREEN 1: START ════════ -->
<div id="s-start" class="screen active">
  <div class="logo">📦</div>
  <div class="start-title">Stock Check</div>
  <div class="start-sub">Phase 1: Count · Phase 2: Compare</div>
  <div class="start-card">
    <label class="field-lbl">Your Name</label>
    <input class="field-inp" id="checker" placeholder="e.g. Raj Patel" type="text" autocomplete="name">
    <label class="field-lbl">Location / Area</label>
    <input class="field-inp" id="location" placeholder="e.g. Warehouse A, Shop Floor" type="text">
    <button class="btn-primary" onclick="startCheck()">Start Physical Count →</button>
  </div>
</div>

<!-- ════════ SCREEN 2: PHASE 1 ════════ -->
<div id="s-phase1" class="screen">
  <div class="top-bar">
    <div class="top-bar-row">
      <div>
        <div class="top-bar-title">Phase 1 — Physical Count</div>
        <div class="top-bar-sub">Walk the floor, count each item</div>
      </div>
      <div class="phase-pill p1">📦 Counting</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill p1-fill" id="p1-bar" style="width:0%"></div></div>
      <div class="progress-label" id="p1-lbl">0 items</div>
    </div>
  </div>

  <div class="body-scroll">
    <div id="p1-list"></div>
    <button class="add-btn" onclick="addItem()">＋&nbsp; Add Item</button>
  </div>

  <div class="foot">
    <button class="btn-ghost" onclick="goTo('s-start')">← Back</button>
    <button class="btn-next blue" onclick="finishPhase1()">✓ &nbsp;Physical Count Done →</button>
  </div>
</div>

<!-- ════════ SCREEN 3: PHASE 2 ════════ -->
<div id="s-phase2" class="screen">
  <div class="p2-banner">
    <div class="p2-badge">✅ Phase 2 — Final Step</div>
    <div class="p2-title">Enter Computer Stock</div>
    <div class="p2-sub">Now open the system and fill in each item's stock</div>
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill p2-fill" id="p2-bar" style="width:0%"></div></div>
      <div class="progress-label" id="p2-lbl">0 / 0 done</div>
    </div>
  </div>

  <div class="body-scroll" id="p2-body"></div>

  <div class="foot">
    <button class="btn-ghost" onclick="goTo('s-phase1')">← Back</button>
    <button class="btn-next green" onclick="goToSummary()">See Results →</button>
  </div>
</div>

<!-- ════════ SCREEN 4: SUMMARY ════════ -->
<div id="s-summary" class="screen">
  <div class="sum-hero">
    <div class="sum-icon">✅</div>
    <div class="sum-title">Check Complete!</div>
    <div class="sum-meta" id="sum-meta"></div>
  </div>
  <div class="body-scroll" id="sum-body"></div>
  <div class="sum-foot">
    <button class="btn-new" onclick="newCheck()">🔄 New</button>
    <button class="btn-export" onclick="exportExcel()">⬇️ Export Excel</button>
  </div>
</div>

<!-- Confirm overlay -->
<div class="overlay" id="overlay">
  <div class="confirm-sheet">
    <div class="confirm-title">📋 Physical Count Done?</div>
    <div class="confirm-body" id="confirm-body"></div>
    <div class="confirm-actions">
      <button class="confirm-cancel" onclick="closeOverlay()">← Keep Editing</button>
      <button class="confirm-go" onclick="confirmPhase2()">Yes, Enter Computer Stock →</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let state = { checker:'', location:'', date:new Date(), items:[] };
let idCtr = 0;

function goTo(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

/* ─── START ─── */
function startCheck() {
  const name = document.getElementById('checker').value.trim();
  if (!name) { showToast('Please enter your name','err'); return; }
  state = { checker:name, location:document.getElementById('location').value.trim(), date:new Date(), items:[] };
  idCtr = 0;
  renderP1();
  goTo('s-phase1');
  setTimeout(addItem, 180);
}

/* ─── PHASE 1 ─── */
function addItem() {
  const id = ++idCtr;
  state.items.push({ id, name:'', brand:'', qty:0, compStock:null });
  renderP1();
  setTimeout(() => { const el = document.getElementById('n-'+id); if(el) el.focus(); }, 60);
}

function removeItem(id) {
  if (state.items.length === 1) { showToast('Need at least 1 item','err'); return; }
  state.items = state.items.filter(i => i.id !== id);
  renderP1();
}

function adjQty(id, d) {
  const item = state.items.find(i => i.id === id);
  if (!item) return;
  item.qty = Math.max(0, (item.qty||0) + d);
  const el = document.getElementById('q-'+id);
  if (el) el.value = item.qty;
}

function syncP1() {
  state.items.forEach(item => {
    const n = document.getElementById('n-'+item.id);
    const b = document.getElementById('b-'+item.id);
    const q = document.getElementById('q-'+item.id);
    if(n) item.name  = n.value.trim();
    if(b) item.brand = b.value.trim();
    if(q) item.qty   = parseInt(q.value)||0;
  });
}

function renderP1() {
  const n = state.items.length;
  document.getElementById('p1-lbl').textContent = n+(n===1?' item':' items');
  document.getElementById('p1-bar').style.width = Math.min(100, n*5)+'%';

  document.getElementById('p1-list').innerHTML = state.items.map((item,idx) => `
    <div class="item-card">
      <div class="item-card-hdr">
        <div class="item-num">${idx+1}</div>
        <div class="item-card-label">Item ${idx+1}</div>
        <button class="del-btn" onclick="removeItem(${item.id})">✕</button>
      </div>
      <div class="item-card-body">
        <div class="inp-lbl"><span class="dot dot-name"></span>Item Name</div>
        <input class="card-inp" id="n-${item.id}" type="text" placeholder="e.g. USB Hub, Laptop Stand…"
          value="${esc(item.name)}"
          oninput="state.items.find(i=>i.id===${item.id}).name=this.value"
          onkeydown="if(event.key==='Enter')document.getElementById('b-${item.id}').focus()">
        <div class="inp-lbl"><span class="dot dot-brand"></span>Brand</div>
        <input class="card-inp" id="b-${item.id}" type="text" placeholder="e.g. Samsung, Dell, Generic…"
          value="${esc(item.brand)}"
          oninput="state.items.find(i=>i.id===${item.id}).brand=this.value"
          onkeydown="if(event.key==='Enter')document.getElementById('q-${item.id}').focus()">
        <div class="inp-lbl"><span class="dot dot-qty"></span>Physical Quantity</div>
        <div class="qty-row">
          <button class="qty-btn" onclick="adjQty(${item.id},-1)">−</button>
          <input class="qty-inp" id="q-${item.id}" type="number" min="0" value="${item.qty||0}"
            oninput="state.items.find(i=>i.id===${item.id}).qty=parseInt(this.value)||0"
            onkeydown="if(event.key==='Enter')addItem()">
          <button class="qty-btn" onclick="adjQty(${item.id},1)">＋</button>
        </div>
      </div>
    </div>
  `).join('');
}

function finishPhase1() {
  syncP1();
  const valid = state.items.filter(i => i.name);
  if (!valid.length) { showToast('Add at least one item','err'); return; }
  state.items = valid;
  const totalQty = state.items.reduce((s,i) => s+(i.qty||0), 0);
  document.getElementById('confirm-body').innerHTML =
    `You've counted <strong>${state.items.length} item${state.items.length>1?'s':''}</strong> with a total of <strong>${totalQty} unit${totalQty!==1?'s':''}.</strong><br><br>
     Once you proceed, you'll enter the <strong>Computer Stock</strong> numbers. Make sure your physical count is fully complete before continuing.`;
  document.getElementById('overlay').classList.add('show');
}

function closeOverlay() { document.getElementById('overlay').classList.remove('show'); }

function confirmPhase2() {
  closeOverlay();
  buildP2();
  goTo('s-phase2');
  setTimeout(() => { const f = document.querySelector('.comp-inp'); if(f) f.focus(); }, 120);
}

/* ─── PHASE 2 ─── */
function buildP2() {
  document.getElementById('p2-body').innerHTML = state.items.map((item,idx) => `
    <div class="comp-card" id="cc-${item.id}">
      <div class="comp-card-left">
        <div class="comp-item-name">${esc(item.name)}</div>
        <div class="comp-item-brand">${esc(item.brand)||'—'}</div>
        <div class="comp-phys-tag">📦 Counted: ${item.qty}</div>
      </div>
      <div class="comp-card-right">
        <input class="comp-inp" id="ci-${item.id}" type="number" min="0" placeholder="—"
          oninput="onCompInput(${item.id},this)"
          onkeydown="compEnter(event,${idx})">
      </div>
    </div>
  `).join('');
  updateP2Progress();
}

function onCompInput(id, el) {
  const item = state.items.find(i => i.id === id);
  if (!item) return;
  item.compStock = el.value==='' ? null : parseInt(el.value);
  el.classList.toggle('done', el.value!=='');
  const card = document.getElementById('cc-'+id);
  if (card) card.classList.toggle('checked', el.value!=='');
  updateP2Progress();
}

function compEnter(event, idx) {
  if (event.key === 'Enter') {
    const inputs = document.querySelectorAll('.comp-inp');
    if (inputs[idx+1]) inputs[idx+1].focus();
  }
}

function updateP2Progress() {
  const done  = state.items.filter(i => i.compStock !== null).length;
  const total = state.items.length;
  document.getElementById('p2-bar').style.width = (total ? done/total*100 : 0)+'%';
  document.getElementById('p2-lbl').textContent = `${done} / ${total} done`;
}

/* ─── SUMMARY ─── */
function getStatus(item) {
  if (item.compStock === null) return 'pending';
  if (item.qty === item.compStock) return 'match';
  return item.qty > item.compStock ? 'over' : 'short';
}

function goToSummary() {
  state.items.forEach(item => {
    const el = document.getElementById('ci-'+item.id);
    if (el && el.value!=='') item.compStock = parseInt(el.value);
  });
  const counts = {match:0,over:0,short:0,pending:0};
  state.items.forEach(i => counts[getStatus(i)]++);

  document.getElementById('sum-meta').textContent =
    `${state.checker}${state.location?' · '+state.location:''} · ${fmtDate(state.date)}`;

  const stLabel = {match:'✔ MATCH', over:'▲ OVER', short:'▼ SHORT', pending:'— N/A'};
  const stCls   = {match:'b-match', over:'b-over',  short:'b-short', pending:'b-na'};

  document.getElementById('sum-body').innerHTML = `
    <div style="padding:16px">
      <div class="stats-grid">
        <div class="stat-card total"><div class="stat-n">${state.items.length}</div><div class="stat-lbl">Total Items</div></div>
        <div class="stat-card match"><div class="stat-n">${counts.match}</div><div class="stat-lbl">Matched</div></div>
        <div class="stat-card short"><div class="stat-n">${counts.short}</div><div class="stat-lbl">Short</div></div>
        <div class="stat-card over"><div class="stat-n">${counts.over}</div><div class="stat-lbl">Over</div></div>
      </div>
      <div class="res-section-title">All Items</div>
      ${state.items.map(item => {
        const st = getStatus(item);
        return `<div class="res-item">
          <span class="res-badge ${stCls[st]}">${stLabel[st]}</span>
          <span class="res-name">${esc(item.name)}</span>
          <span class="res-nums">${item.qty}<br><span style="color:var(--g200)">vs</span> ${item.compStock??'—'}</span>
        </div>`;
      }).join('')}
    </div>`;
  goTo('s-summary');
}

/* ─── EXPORT ─── */
function exportExcel() {
  const wb = XLSX.utils.book_new();
  const today = fmtDate(state.date);
  const rows = [
    ['STOCK CHECK REPORT'],[''],
    ['Checked by:',state.checker,'','Location:',state.location||'—'],
    ['Date:',today,'','Total Items:',state.items.length],[''],
    ['#','Item Name','Brand','Physical Qty','Computer Stock','Difference','Status'],
  ];
  state.items.forEach((item,idx) => {
    const st   = getStatus(item);
    const lbl  = {match:'✔ MATCH',over:'▲ OVER',short:'▼ SHORT',pending:'— N/A'}[st];
    const diff = item.compStock!==null ? item.qty-item.compStock : '';
    rows.push([idx+1, item.name, item.brand||'', item.qty, item.compStock??'', diff, lbl]);
  });
  rows.push([''],['','TOTALS','',
    state.items.reduce((s,i)=>s+(i.qty||0),0),
    state.items.reduce((s,i)=>s+(i.compStock||0),0),'','']);
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:4},{wch:28},{wch:18},{wch:14},{wch:14},{wch:12},{wch:14}];
  XLSX.utils.book_append_sheet(wb, ws, 'Stock Check');
  XLSX.writeFile(wb, `StockCheck_${state.checker.replace(/\s+/g,'_')}_${today.replace(/\s/g,'')}.xlsx`);
  showToast('✅ Excel downloaded!','ok');
}

function newCheck() {
  state = { checker:'', location:'', date:new Date(), items:[] };
  idCtr = 0;
  document.getElementById('checker').value = '';
  document.getElementById('location').value = '';
  goTo('s-start');
}

function fmtDate(d) { return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg,type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className='toast '+(type||'')+' show';
  setTimeout(()=>t.classList.remove('show'),2800);
}
</script>
</body>
</html>
